services:
  prometheus:
    image: prom/prometheus:latest
    container_name: n8n-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - n8n_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: n8n-grafana
    ports:
      - "3000:3000"
    entrypoint: ["/bin/sh", "/usr/local/bin/n8n-grafana-entrypoint.sh"]
    volumes:
      - n8n_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning-src:ro
      - ./grafana/entrypoint.sh:/usr/local/bin/n8n-grafana-entrypoint.sh:ro
      - ./dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - GRAFANA_SLACK_TOKEN=${GRAFANA_SLACK_TOKEN:-}
      - GRAFANA_SLACK_CHANNEL=${GRAFANA_SLACK_CHANNEL:-}
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  n8n_prometheus_data:
  n8n_grafana_data:
